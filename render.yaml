services:
  - type: web
    name: cipher-lab
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn cipher_project.wsgi:application
    releaseCommand: python manage.py migrate --noinput
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        value: cipher-lab.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://cipher-lab.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: cipher-lab-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: 4

databases:
  - name: cipher-lab-db
    databaseName: cipherlab
    user: cipherlab
    plan: free
